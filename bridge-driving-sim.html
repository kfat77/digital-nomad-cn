<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大桥驾驶模拟器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    overflow: hidden;
    background: #0a0a0a;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    user-select: none;
}
canvas { display: block; }
#controls {
    position: absolute;
    top: 12px; left: 12px;
    color: rgba(255,255,255,0.85);
    font-size: 13px;
    line-height: 1.8;
    background: rgba(0,0,0,0.55);
    padding: 12px 16px;
    border-radius: 8px;
    pointer-events: none;
    backdrop-filter: blur(4px);
}
#controls kbd {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 12px;
    margin: 0 2px;
    border: 1px solid rgba(255,255,255,0.2);
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="controls">
    <kbd>W</kbd> / <kbd>↑</kbd> 油门 &nbsp;&nbsp;
    <kbd>S</kbd> / <kbd>↓</kbd> 刹车<br>
    <kbd>A</kbd> / <kbd>←</kbd> <kbd>D</kbd> / <kbd>→</kbd> 转向<br>
    <kbd>P</kbd> 停车 &nbsp;
    <kbd>R</kbd> 倒车 &nbsp;
    <kbd>N</kbd> 空档 &nbsp;
    <kbd>D</kbd> 前进
</div>

<script>
/* ============================================================
   大桥驾驶模拟器 - 第一人称视角
   ============================================================ */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H, CX, CY;
function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    CX = W / 2;
    CY = H / 2;
}
window.addEventListener('resize', resize);
resize();

/* ---------- 常量 ---------- */
const FOV = 600;               // 透视焦距
const EYE_Y = 120;             // 眼高（厘米）
const LANE_WIDTH = 360;        // 车道宽
const ROAD_WIDTH = 1440;       // 桥面总宽
const SEG_LEN = 200;           // 路段长度
const DRAW_DIST = 12000;       // 绘制距离
const TOWER_DIST = 8000;       // 桥塔间距
const TOWER_HEIGHT = 2500;     // 桥塔高
const MAX_SPEED = 55;          // 最大速度 m/s (~200km/h)
const MAX_RPM = 8000;
const IDLE_RPM = 800;
const GEAR_RATIOS = { P:0, N:0, R:-4.5, D1:3.8, D2:2.2, D3:1.5, D4:1.0, D5:0.7, D6:0.5 };
const GEAR_ORDER = ['P','R','N','D1','D2','D3','D4','D5','D6'];
const STEERING_RATIO = 15;     // 方向盘:车轮 = 15:1
const MAX_WHEEL_ANGLE = 35;    // 最大车轮转角
const MAX_STEERING_WHEEL = 540;// 方向盘最大转角

/* ---------- 游戏状态 ---------- */
const car = {
    speed: 0,          // m/s
    rpm: IDLE_RPM,
    gearIdx: 0,        // 指向 GEAR_ORDER
    gear: 'P',
    steeringWheel: 0,  // 方向盘角度 deg
    wheelAngle: 0,     // 车轮转角 deg
    yaw: 0,            // 车辆偏航角
    lateral: 0,        // 横向偏移 (cm)
    odometer: 0,       // 总里程
    throttle: 0,       // 0~1
    brake: 0,          // 0~1
};

const world = {
    time: 0,
    towerPhase: 0,     // 用于桥塔循环
    waterOffset: 0,
};

const keys = {};
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; keys[e.code] = true; });
window.addEventListener('keyup',   e => { keys[e.key.toLowerCase()] = false; keys[e.code] = false; });

/* ---------- 辅助函数 ---------- */
function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }
function lerp(a, b, t) { return a + (b - a) * t; }
function degToRad(d) { return d * Math.PI / 180; }
function project(x, y, z) {
    if (z <= 10) return null;
    const s = FOV / z;
    return { x: CX + x * s, y: CY - (y - EYE_Y) * s, s: s };
}

/* ---------- 物理更新 ---------- */
function updatePhysics(dt) {
    // 输入解析
    car.throttle = 0;
    car.brake = 0;
    let steerInput = 0;
    if (keys['w'] || keys['arrowup'])   car.throttle = 1;
    if (keys['s'] || keys['arrowdown']) car.brake = 1;
    if (keys['a'] || keys['arrowleft'])  steerInput = -1;
    if (keys['d'] || keys['arrowright']) steerInput = 1;

    // 换挡
    if (keys['p']) setGear('P');
    if (keys['r']) setGear('R');
    if (keys['n']) setGear('N');
    if (keys['d']) setGear('D1');

    // 自动升档 / 降档
    autoGear();

    // 方向盘物理
    const steerSpeed = 360; // deg/s
    const returnSpeed = 3.0; // 回正系数
    if (steerInput !== 0) {
        car.steeringWheel += steerInput * steerSpeed * dt;
    } else {
        car.steeringWheel *= (1 - returnSpeed * dt);
    }
    car.steeringWheel = clamp(car.steeringWheel, -MAX_STEERING_WHEEL, MAX_STEERING_WHEEL);

    // 车轮转角（考虑速度对转向灵敏度的影响：高速迟钝）
    const speedFactor = 1 / (1 + car.speed * 0.08);
    const targetWheel = car.steeringWheel / STEERING_RATIO * speedFactor;
    car.wheelAngle = clamp(targetWheel, -MAX_WHEEL_ANGLE, MAX_WHEEL_ANGLE);

    // 速度物理
    const gearRatio = GEAR_RATIOS[car.gear] || 0;
    const engineTorque = getEngineTorque(car.rpm);
    const driveForce = car.gear === 'P' ? 0 :
        (car.throttle * engineTorque * gearRatio * 12 - 
         car.brake * 25000 -
         airResistance(car.speed) -
         rollingResistance());

    const accel = driveForce / 1500; // 质量1500kg
    car.speed += accel * dt;

    // 停车档锁止
    if (car.gear === 'P') {
        car.speed *= 0.95;
        if (Math.abs(car.speed) < 0.1) car.speed = 0;
    }
    car.speed = clamp(car.speed, -15, MAX_SPEED);

    // 偏航与横向
    if (Math.abs(car.speed) > 0.5) {
        const yawRate = degToRad(car.wheelAngle) * car.speed * 0.015;
        car.yaw += yawRate * dt;
        car.lateral += Math.sin(car.yaw) * car.speed * 100 * dt;
    }

    // RPM
    if (car.gear === 'N' || car.gear === 'P') {
        car.rpm = lerp(car.rpm, IDLE_RPM + car.throttle * 3000, 3 * dt);
    } else if (Math.abs(car.speed) < 0.5 && car.throttle > 0) {
        car.rpm = lerp(car.rpm, IDLE_RPM + car.throttle * 3000, 3 * dt);
    } else {
        const wheelRpm = car.speed * 60 / (2 * Math.PI * 0.33); // 轮胎周长约2m
        car.rpm = Math.abs(wheelRpm * gearRatio);
        car.rpm = lerp(car.rpm, clamp(car.rpm, IDLE_RPM, MAX_RPM), 5 * dt);
    }

    car.odometer += car.speed * dt;
    world.time += dt;
    world.waterOffset += car.speed * dt * 0.3;
}

function setGear(g) {
    const idx = GEAR_ORDER.indexOf(g);
    if (idx >= 0) { car.gearIdx = idx; car.gear = g; }
}

function autoGear() {
    if (!car.gear.startsWith('D')) return;
    const gnum = parseInt(car.gear.replace('D',''));
    if (isNaN(gnum)) return;
    // 升档
    if (car.rpm > 5500 && gnum < 6) setGear('D' + (gnum + 1));
    // 降档
    if (car.rpm < 2000 && gnum > 1) setGear('D' + (gnum - 1));
}

function getEngineTorque(rpm) {
    // 简化扭矩曲线
    const x = rpm / 1000;
    return 150 + 120 * Math.sin((x - 1) * 0.5) + 80 * Math.exp(-Math.pow(x - 4, 2) / 4);
}
function airResistance(v) { return 0.35 * v * v; }
function rollingResistance() { return 200; }

/* ---------- 渲染 ---------- */
function render() {
    // 清屏
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, W, H);

    // 1. 天空
    drawSky();

    // 2. 3D 桥场景
    drawBridgeScene();

    // 3. 车内框架（车窗边框/A柱）
    drawCarFrame();

    // 4. 仪表盘 + 中控屏
    drawDashboard();

    // 5. 方向盘（最上层，带旋转）
    drawSteeringWheel();
}

/* ---- 天空 ---- */
function drawSky() {
    const grad = ctx.createLinearGradient(0, 0, 0, CY);
    grad.addColorStop(0, '#87CEEB');
    grad.addColorStop(0.5, '#B0D4E8');
    grad.addColorStop(1, '#D6E8F0');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, CY + 20);

    // 太阳
    ctx.save();
    ctx.globalAlpha = 0.6;
    const sunGrad = ctx.createRadialGradient(W * 0.75, H * 0.12, 5, W * 0.75, H * 0.12, 60);
    sunGrad.addColorStop(0, 'rgba(255,240,200,1)');
    sunGrad.addColorStop(0.5, 'rgba(255,220,150,0.5)');
    sunGrad.addColorStop(1, 'rgba(255,200,100,0)');
    ctx.fillStyle = sunGrad;
    ctx.beginPath();
    ctx.arc(W * 0.75, H * 0.12, 60, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // 远处云层
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    for (let i = 0; i < 5; i++) {
        const cx = W * 0.15 + i * W * 0.2 + Math.sin(world.time * 0.1 + i) * 30;
        const cy = H * 0.15 + Math.cos(world.time * 0.07 + i * 1.3) * 15;
        ctx.beginPath();
        ctx.ellipse(cx, cy, 70 + i * 15, 20 + i * 5, 0, 0, Math.PI * 2);
        ctx.fill();
    }
}

/* ---- 3D 桥场景 ---- */
function drawBridgeScene() {
    const horizonY = CY;
    
    // 水面（桥下）
    const waterGrad = ctx.createLinearGradient(0, horizonY, 0, H);
    waterGrad.addColorStop(0, '#4A90A4');
    waterGrad.addColorStop(0.3, '#2E6B7F');
    waterGrad.addColorStop(1, '#1A3D4A');
    ctx.fillStyle = waterGrad;
    ctx.fillRect(0, horizonY, W, H - horizonY);

    // 水波纹
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 20; i++) {
        const wy = horizonY + 30 + i * (H - horizonY) / 20;
        const waveOffset = world.waterOffset * (0.5 + i * 0.05) + i * 100;
        ctx.beginPath();
        for (let x = 0; x < W; x += 15) {
            const y = wy + Math.sin((x + waveOffset) * 0.02) * 3;
            if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
    }

    // 收集路段数据（从远到近）
    const segments = [];
    const segCount = Math.ceil(DRAW_DIST / SEG_LEN);
    for (let i = segCount; i >= 0; i--) {
        const z = i * SEG_LEN;
        // 轻微起伏让桥更真实
        const bridgeY = Math.sin(z * 0.001) * 30 + 50;
        segments.push({ z, y: bridgeY });
    }

    // 绘制桥面（从远到近）
    for (let i = 0; i < segments.length - 1; i++) {
        const s1 = segments[i];
        const s2 = segments[i + 1];
        drawBridgeSegment(s1, s2);
    }

    // 桥塔（从远到近）
    const towerBaseZ = world.towerPhase % TOWER_DIST;
    for (let tz = DRAW_DIST; tz > 0; tz -= TOWER_DIST) {
        const actualZ = tz - towerBaseZ;
        if (actualZ > 100) drawTower(actualZ);
    }

    // 护栏与路灯
    for (let i = segments.length - 1; i >= 0; i--) {
        const s = segments[i];
        drawRailing(s.z, s.y);
    }
}

function drawBridgeSegment(s1, s2) {
    const z1 = s1.z, z2 = s2.z;
    const p1 = project(-ROAD_WIDTH / 2, s1.y, z1);
    const p2 = project(ROAD_WIDTH / 2,  s1.y, z1);
    const p3 = project(ROAD_WIDTH / 2,  s2.y, z2);
    const p4 = project(-ROAD_WIDTH / 2, s2.y, z2);
    if (!p1 || !p2 || !p3 || !p4) return;

    // 路面
    ctx.fillStyle = '#555555';
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.lineTo(p3.x, p3.y);
    ctx.lineTo(p4.x, p4.y);
    ctx.closePath();
    ctx.fill();

    // 路面高光
    const roadGrad = ctx.createLinearGradient(CX, p1.y, CX, p3.y);
    roadGrad.addColorStop(0, 'rgba(100,100,100,0.3)');
    roadGrad.addColorStop(1, 'rgba(60,60,60,0.1)');
    ctx.fillStyle = roadGrad;
    ctx.fill();

    // 车道线（白色虚线）
    const segIndex = Math.floor(z1 / SEG_LEN);
    if (segIndex % 2 === 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        const lw = LANE_WIDTH;
        // 左车道线
        const lp1 = project(-lw / 2, s1.y + 2, z1);
        const lp2 = project(-lw / 2, s2.y + 2, z2);
        const lw2 = 4 * p1.s;
        if (lp1 && lp2) {
            ctx.fillRect(lp1.x - lw2 / 2, lp1.y, lw2, lp2.y - lp1.y);
        }
        // 右车道线
        const rp1 = project(lw / 2, s1.y + 2, z1);
        const rp2 = project(lw / 2, s2.y + 2, z2);
        if (rp1 && rp2) {
            ctx.fillRect(rp1.x - lw2 / 2, rp1.y, lw2, rp2.y - rp1.y);
        }
        // 中心双黄线
        const cp1 = project(0, s1.y + 2, z1);
        const cp2 = project(0, s2.y + 2, z2);
        if (cp1 && cp2) {
            const cw = 3 * p1.s;
            ctx.fillStyle = 'rgba(220,180,50,0.8)';
            ctx.fillRect(cp1.x - cw / 2, cp1.y, cw, cp2.y - cp1.y);
        }
    }

    // 桥边缘线
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 2 * p1.s;
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y); ctx.lineTo(p4.x, p4.y);
    ctx.moveTo(p2.x, p2.y); ctx.lineTo(p3.x, p3.y);
    ctx.stroke();
}

function drawTower(z) {
    const towerW = 300;
    const towerD = 200;
    const th = TOWER_HEIGHT;

    // 塔柱底部
    const bl = project(-ROAD_WIDTH / 2 - towerW / 2, 50, z);
    const br = project(ROAD_WIDTH / 2 + towerW / 2, 50, z);
    // 塔顶
    const tl = project(-ROAD_WIDTH / 2 - towerW / 3, 50 + th, z);
    const tr = project(ROAD_WIDTH / 2 + towerW / 3, 50 + th, z);

    if (!bl || !br || !tl || !tr) return;

    // 塔身填充
    ctx.fillStyle = '#7A8B99';
    ctx.beginPath();
    ctx.moveTo(bl.x, bl.y);
    ctx.lineTo(tl.x, tl.y);
    ctx.lineTo(tr.x, tr.y);
    ctx.lineTo(br.x, br.y);
    ctx.closePath();
    ctx.fill();

    // 塔身阴影面
    ctx.fillStyle = '#5A6B77';
    ctx.beginPath();
    ctx.moveTo(br.x, br.y);
    ctx.lineTo(tr.x, tr.y);
    const tr2 = project(ROAD_WIDTH / 2 + towerW / 3 + towerD * 0.3, 50 + th, z + towerD);
    const br2 = project(ROAD_WIDTH / 2 + towerW / 2 + towerD * 0.3, 50, z + towerD);
    if (tr2 && br2) {
        ctx.lineTo(tr2.x, tr2.y);
        ctx.lineTo(br2.x, br2.y);
    }
    ctx.closePath();
    ctx.fill();

    // 塔顶横梁
    const beamY = 50 + th * 0.85;
    const bL = project(-ROAD_WIDTH / 2 - towerW / 2.5, beamY, z);
    const bR = project(ROAD_WIDTH / 2 + towerW / 2.5, beamY, z);
    if (bL && bR) {
        ctx.fillStyle = '#8A9BA9';
        ctx.fillRect(bL.x, bL.y - 8 * bl.s, bR.x - bL.x, 16 * bl.s);
    }

    // 悬索（主缆）
    ctx.strokeStyle = 'rgba(180,190,200,0.6)';
    ctx.lineWidth = Math.max(1, 2 * bl.s);
    // 左塔到桥面
    for (let side = -1; side <= 1; side += 2) {
        const anchorX = side * (ROAD_WIDTH / 2 + towerW / 2.5);
        const topX = side * (ROAD_WIDTH / 2 + towerW / 3);
        
        // 从塔顶到远处锚碇的曲线
        ctx.beginPath();
        for (let t = 0; t <= 1; t += 0.05) {
            const cx = lerp(topX, topX + side * 3000, t);
            const cy = lerp(50 + th, 50, t) + Math.sin(t * Math.PI) * 80 * (1 - t);
            const pp = project(cx, cy, z);
            if (pp) {
                if (t === 0) ctx.moveTo(pp.x, pp.y);
                else ctx.lineTo(pp.x, pp.y);
            }
        }
        ctx.stroke();

        // 垂直吊索
        ctx.strokeStyle = 'rgba(160,170,180,0.35)';
        ctx.lineWidth = Math.max(0.5, bl.s);
        for (let t = 0.1; t < 0.9; t += 0.08) {
            const sx = lerp(topX, anchorX + side * 2000, t);
            const syTop = lerp(50 + th, 50, t) + Math.sin(t * Math.PI) * 80 * (1 - t);
            const syBot = 50;
            const pTop = project(sx, syTop, z);
            const pBot = project(sx, syBot, z + 100);
            if (pTop && pBot) {
                ctx.beginPath();
                ctx.moveTo(pTop.x, pTop.y);
                ctx.lineTo(pBot.x, pBot.y);
                ctx.stroke();
            }
        }
    }
}

function drawRailing(z, y) {
    const p = project(-ROAD_WIDTH / 2 - 20, y + 80, z);
    if (!p) return;
    
    // 护栏
    ctx.fillStyle = '#A0A0A0';
    const rw = 15 * p.s, rh = 60 * p.s;
    ctx.fillRect(p.x - rw / 2, p.y - rh, rw, rh);
    
    const pR = project(ROAD_WIDTH / 2 + 20, y + 80, z);
    if (pR) {
        ctx.fillRect(pR.x - rw / 2, pR.y - rh, rw, rh);
    }

    // 路灯
    if (Math.floor(z / 400) % 2 === 0) {
        const poleH = 400;
        const lp = project(-ROAD_WIDTH / 2 - 40, y + 80 + poleH, z);
        const lb = project(-ROAD_WIDTH / 2 - 40, y + 80, z);
        if (lp && lb) {
            ctx.strokeStyle = '#888';
            ctx.lineWidth = 3 * p.s;
            ctx.beginPath();
            ctx.moveTo(lb.x, lb.y);
            ctx.lineTo(lp.x, lp.y);
            ctx.stroke();
            // 灯头
            ctx.fillStyle = 'rgba(255,250,220,0.8)';
            ctx.beginPath();
            ctx.arc(lp.x, lp.y, 6 * p.s, 0, Math.PI * 2);
            ctx.fill();
        }
    }
}

/* ---- 车内框架（模仿图片中的车窗边框） ---- */
function drawCarFrame() {
    // A柱（左）
    const pillarGradL = ctx.createLinearGradient(0, 0, W * 0.12, H);
    pillarGradL.addColorStop(0, '#1a1a1a');
    pillarGradL.addColorStop(1, '#0d0d0d');
    ctx.fillStyle = pillarGradL;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(W * 0.18, 0);
    ctx.lineTo(W * 0.22, H * 0.35);
    ctx.lineTo(W * 0.08, H * 0.48);
    ctx.lineTo(0, H * 0.42);
    ctx.closePath();
    ctx.fill();

    // A柱（右）
    const pillarGradR = ctx.createLinearGradient(W, 0, W * 0.88, H);
    pillarGradR.addColorStop(0, '#1a1a1a');
    pillarGradR.addColorStop(1, '#0d0d0d');
    ctx.fillStyle = pillarGradR;
    ctx.beginPath();
    ctx.moveTo(W, 0);
    ctx.lineTo(W * 0.82, 0);
    ctx.lineTo(W * 0.78, H * 0.35);
    ctx.lineTo(W * 0.92, H * 0.48);
    ctx.lineTo(W, H * 0.42);
    ctx.closePath();
    ctx.fill();

    // 车顶遮阳板区域
    ctx.fillStyle = '#121212';
    ctx.fillRect(0, 0, W, H * 0.08);

    // 中控台顶部
    ctx.fillStyle = '#141414';
    ctx.beginPath();
    ctx.moveTo(W * 0.08, H * 0.48);
    ctx.lineTo(W * 0.22, H * 0.35);
    ctx.lineTo(W * 0.78, H * 0.35);
    ctx.lineTo(W * 0.92, H * 0.48);
    ctx.lineTo(W * 0.88, H * 0.52);
    ctx.lineTo(W * 0.12, H * 0.52);
    ctx.closePath();
    ctx.fill();

    // 车门内饰（左下）
    ctx.fillStyle = '#0f0f0f';
    ctx.beginPath();
    ctx.moveTo(0, H * 0.42);
    ctx.lineTo(W * 0.08, H * 0.48);
    ctx.lineTo(W * 0.12, H * 0.52);
    ctx.lineTo(W * 0.15, H * 0.95);
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fill();

    // 车门内饰（右下）
    ctx.beginPath();
    ctx.moveTo(W, H * 0.42);
    ctx.lineTo(W * 0.92, H * 0.48);
    ctx.lineTo(W * 0.88, H * 0.52);
    ctx.lineTo(W * 0.85, H * 0.95);
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fill();
}

/* ---- 仪表盘 + 中控屏 ---- */
function drawDashboard() {
    const dashY = H * 0.50;
    const dashH = H * 0.22;

    // 仪表台背景
    const dashGrad = ctx.createLinearGradient(0, dashY, 0, dashY + dashH);
    dashGrad.addColorStop(0, '#1c1c1c');
    dashGrad.addColorStop(0.5, '#161616');
    dashGrad.addColorStop(1, '#0e0e0e');
    ctx.fillStyle = dashGrad;
    ctx.beginPath();
    ctx.moveTo(W * 0.12, dashY);
    ctx.lineTo(W * 0.88, dashY);
    ctx.lineTo(W * 0.92, dashY + dashH);
    ctx.lineTo(W * 0.08, dashY + dashH);
    ctx.closePath();
    ctx.fill();

    // 仪表台顶部高光边
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(W * 0.12, dashY);
    ctx.lineTo(W * 0.88, dashY);
    ctx.stroke();

    // ========== 左侧：数字仪表盘 ==========
    const gaugeR = Math.min(W, H) * 0.10;
    const gaugeCX = W * 0.28;
    const gaugeCY = dashY + dashH * 0.45;

    // 仪表盘外圈
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(gaugeCX, gaugeCY, gaugeR, 0, Math.PI * 2);
    ctx.stroke();

    // 仪表盘背景
    ctx.fillStyle = '#0a0a0a';
    ctx.beginPath();
    ctx.arc(gaugeCX, gaugeCY, gaugeR - 2, 0, Math.PI * 2);
    ctx.fill();

    // 转速表刻度（半圆）
    ctx.strokeStyle = '#444';
    ctx.lineWidth = 2;
    for (let i = 0; i <= 8; i++) {
        const angle = Math.PI + (i / 8) * Math.PI;
        const r1 = gaugeR - 8, r2 = gaugeR - 18;
        ctx.beginPath();
        ctx.moveTo(gaugeCX + Math.cos(angle) * r1, gaugeCY + Math.sin(angle) * r1);
        ctx.lineTo(gaugeCX + Math.cos(angle) * r2, gaugeCY + Math.sin(angle) * r2);
        ctx.stroke();
    }

    // RPM 指针
    const rpmAngle = Math.PI + (car.rpm / MAX_RPM) * Math.PI;
    ctx.strokeStyle = car.rpm > 6500 ? '#ff4444' : '#4FC3F7';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(gaugeCX, gaugeCY);
    ctx.lineTo(gaugeCX + Math.cos(rpmAngle) * (gaugeR - 25), gaugeCY + Math.sin(rpmAngle) * (gaugeR - 25));
    ctx.stroke();

    // 中心数字
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${gaugeR * 0.35}px 'Microsoft YaHei', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(Math.round(car.rpm), gaugeCX, gaugeCY - gaugeR * 0.1);
    ctx.fillStyle = '#888';
    ctx.font = `${gaugeR * 0.15}px sans-serif`;
    ctx.fillText('rpm', gaugeCX, gaugeCY + gaugeR * 0.2);

    // 小数字：时速
    ctx.fillStyle = '#4FC3F7';
    ctx.font = `bold ${gaugeR * 0.22}px sans-serif`;
    const kmh = Math.abs(Math.round(car.speed * 3.6));
    ctx.fillText(kmh + ' km/h', gaugeCX, gaugeCY + gaugeR * 0.55);

    // ========== 中央：档位显示 + 小信息 ==========
    const centerX = W * 0.5;
    const centerY = dashY + dashH * 0.35;

    // 档位大显示
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.min(W, H) * 0.055}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(car.gear.replace(/\d/, ''), centerX, centerY);

    // 档位下方小指示点
    if (car.gear.startsWith('D')) {
        const gnum = parseInt(car.gear.replace('D',''));
        for (let i = 1; i <= 6; i++) {
            ctx.fillStyle = i === gnum ? '#4FC3F7' : '#333';
            ctx.beginPath();
            ctx.arc(centerX + (i - 3.5) * 14, centerY + 22, 4, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // ========== 右侧：悬浮式中控屏（模仿小米） ==========
    const screenW = W * 0.22;
    const screenH = H * 0.16;
    const screenX = W * 0.72;
    const screenY = dashY + dashH * 0.08;

    // 屏幕边框
    ctx.fillStyle = '#1a1a1a';
    roundRect(ctx, screenX, screenY, screenW, screenH, 10);
    ctx.fill();

    // 屏幕显示区域
    ctx.fillStyle = '#0d1b2a';
    roundRect(ctx, screenX + 4, screenY + 4, screenW - 8, screenH - 8, 8);
    ctx.fill();

    // 屏幕内容 - 导航/歌词样式
    ctx.fillStyle = 'rgba(100,180,255,0.7)';
    ctx.font = `${screenH * 0.12}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('大桥驾驶模拟', screenX + screenW / 2, screenY + screenH * 0.25);

    // 圆形专辑封面样式
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(screenX + screenW * 0.25, screenY + screenH * 0.6, screenH * 0.18, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fill();

    // 歌词文字
    ctx.fillStyle = 'rgba(200,220,240,0.8)';
    ctx.font = `${screenH * 0.09}px sans-serif`;
    ctx.textAlign = 'left';
    ctx.fillText('速度: ' + kmh + ' km/h', screenX + screenW * 0.42, screenY + screenH * 0.52);
    ctx.fillText('里程: ' + (car.odometer / 1000).toFixed(1) + ' km', screenX + screenW * 0.42, screenY + screenH * 0.68);
    ctx.fillText('转速: ' + Math.round(car.rpm), screenX + screenW * 0.42, screenY + screenH * 0.84);

    // 底部进度条
    ctx.fillStyle = '#333';
    ctx.fillRect(screenX + screenW * 0.08, screenY + screenH * 0.9, screenW * 0.84, 3);
    ctx.fillStyle = '#4FC3F7';
    const progress = (Math.sin(world.time * 0.5) + 1) / 2;
    ctx.fillRect(screenX + screenW * 0.08, screenY + screenH * 0.9, screenW * 0.84 * progress, 3);

    // 空调温度显示（模仿图片右下角）
    ctx.fillStyle = '#888';
    ctx.font = `${Math.min(W,H)*0.015}px sans-serif`;
    ctx.textAlign = 'right';
    ctx.fillText('23.0°C', screenX + screenW - 10, screenY + screenH - 8);
    ctx.textAlign = 'left';
    ctx.fillText('22.5°C', screenX + 10, screenY + screenH - 8);
}

/* ---- 方向盘 ---- */
function drawSteeringWheel() {
    const swCX = W * 0.28;
    const swCY = H * 0.82;
    const swR = Math.min(W, H) * 0.18;
    const angle = degToRad(car.steeringWheel);

    ctx.save();
    ctx.translate(swCX, swCY);
    ctx.rotate(angle);

    // 外圈
    const rimGrad = ctx.createRadialGradient(0, 0, swR * 0.85, 0, 0, swR);
    rimGrad.addColorStop(0, '#2a2a2a');
    rimGrad.addColorStop(0.7, '#1a1a1a');
    rimGrad.addColorStop(1, '#0a0a0a');
    ctx.fillStyle = rimGrad;
    ctx.beginPath();
    ctx.arc(0, 0, swR, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.stroke();

    // 轮圈高光
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, 0, swR - 3, 0, Math.PI * 2);
    ctx.stroke();

    // 平底（D型方向盘底部切平）
    ctx.fillStyle = '#0f0f0f';
    ctx.beginPath();
    ctx.moveTo(-swR * 0.3, swR * 0.92);
    ctx.lineTo(swR * 0.3, swR * 0.92);
    ctx.lineTo(swR * 0.4, swR * 1.05);
    ctx.lineTo(-swR * 0.4, swR * 1.05);
    ctx.closePath();
    ctx.fill();

    // 中央 Hub
    ctx.fillStyle = '#141414';
    ctx.beginPath();
    ctx.arc(0, 0, swR * 0.35, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 2;
    ctx.stroke();

    // 标志区域（模仿 XIAOMI）
    ctx.fillStyle = '#1c1c1c';
    roundRect(ctx, -swR * 0.2, -swR * 0.08, swR * 0.4, swR * 0.16, 4);
    ctx.fill();
    ctx.fillStyle = '#888';
    ctx.font = `bold ${swR * 0.08}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('XIAOMI', 0, 0);

    // 左右辐条
    ctx.fillStyle = '#1a1a1a';
    // 左辐条
    ctx.beginPath();
    ctx.moveTo(-swR * 0.35, -swR * 0.1);
    ctx.lineTo(-swR * 0.85, -swR * 0.35);
    ctx.lineTo(-swR * 0.9, -swR * 0.15);
    ctx.lineTo(-swR * 0.35, swR * 0.05);
    ctx.closePath();
    ctx.fill();
    // 右辐条
    ctx.beginPath();
    ctx.moveTo(swR * 0.35, -swR * 0.1);
    ctx.lineTo(swR * 0.85, -swR * 0.35);
    ctx.lineTo(swR * 0.9, -swR * 0.15);
    ctx.lineTo(swR * 0.35, swR * 0.05);
    ctx.closePath();
    ctx.fill();

    // 底部辐条（银色装饰条）
    ctx.fillStyle = '#888';
    ctx.fillRect(-swR * 0.06, swR * 0.35, swR * 0.12, swR * 0.25);
    ctx.fillStyle = '#aaa';
    ctx.fillRect(-swR * 0.04, swR * 0.37, swR * 0.08, swR * 0.21);

    // 拨片/按钮
    ctx.fillStyle = '#222';
    roundRect(ctx, -swR * 0.75, -swR * 0.5, swR * 0.15, swR * 0.1, 3);
    ctx.fill();
    roundRect(ctx, swR * 0.6, -swR * 0.5, swR * 0.15, swR * 0.1, 3);
    ctx.fill();

    // 红色模式按钮（模仿图片中的红色按钮）
    ctx.fillStyle = '#c62828';
    ctx.beginPath();
    ctx.arc(0, swR * 0.55, swR * 0.06, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `${swR * 0.04}px sans-serif`;
    ctx.fillText('MODE', 0, swR * 0.55);

    ctx.restore();

    // 驾驶员手部（简化示意，可选）
    // 这里不画手，让用户专注于操作
}

/* ---- 工具函数 ---- */
function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

/* ---------- 主循环 ---------- */
let lastTime = performance.now();

function loop() {
    const now = performance.now();
    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;

    // 更新桥塔相位
    world.towerPhase = (world.towerPhase + car.speed * dt * 100) % TOWER_DIST;

    updatePhysics(dt);
    render();
    requestAnimationFrame(loop);
}

loop();
</script>
