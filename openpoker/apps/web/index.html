<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenPoker — Equity &amp; Hand Evaluator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f23;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 520px;
        }
        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 4px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .tab {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #2a2a4e;
            background: #1a1a2e;
            color: #888;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        .tab.active {
            background: #e94560;
            color: #fff;
            border-color: #e94560;
        }
        .tab:hover:not(.active) {
            border-color: #444;
            color: #ccc;
        }
        .card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #2a2a4e;
        }
        .panel { display: none; }
        .panel.active { display: block; }
        .field {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #aaa;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #0f0f23;
            color: #fff;
            font-size: 1rem;
            font-family: 'SF Mono', monospace;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #e94560;
        }
        .checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .checkbox input { cursor: pointer; }
        button {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            background: #e94560;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: #16213e;
            border-radius: 12px;
            display: none;
        }
        .result.show { display: block; }
        .result h3 {
            text-align: center;
            margin-bottom: 16px;
            font-size: 1rem;
            color: #ccc;
        }
        .bar-container {
            display: flex;
            height: 32px;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 16px;
        }
        .bar-hero {
            background: #4ecca3;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            transition: width 0.5s ease;
        }
        .bar-villain {
            background: #e94560;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            transition: width 0.5s ease;
        }
        .row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #2a2a4e;
        }
        .row:last-child { border-bottom: none; }
        .error {
            margin-top: 12px;
            padding: 12px;
            background: #3a1010;
            border-radius: 8px;
            color: #ff6b6b;
            display: none;
        }
        .error.show { display: block; }
        .hand-display {
            text-align: center;
            font-size: 2.5rem;
            margin: 12px 0;
            letter-spacing: 4px;
        }
        .hand-category {
            text-align: center;
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffd700;
            margin-bottom: 8px;
        }
        .suit-s { color: #aaa; }
        .suit-h { color: #e94560; }
        .suit-d { color: #3498db; }
        .suit-c { color: #4ecca3; }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #555;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>♠️ OpenPoker</h1>
        <p class="subtitle">WASM-powered Poker Tools</p>
        
        <div class="tabs">
            <div class="tab active" data-tab="equity">Equity Calc</div>
            <div class="tab" data-tab="eval">Hand Eval</div>
        </div>

        <!-- Equity Calculator Panel -->
        <div class="panel active" id="panel-equity">
            <div class="card">
                <div class="field">
                    <label>Hero Hand</label>
                    <input type="text" id="hero" value="AsKs" placeholder="e.g. AsKs">
                </div>
                <div class="field">
                    <label>Villain Hand</label>
                    <input type="text" id="villain" value="QdQc" placeholder="e.g. QdQc">
                </div>
                <div class="field">
                    <label>Board (optional)</label>
                    <input type="text" id="board" value="" placeholder="e.g. TsJs2h">
                </div>
                <label class="checkbox">
                    <input type="checkbox" id="exact">
                    <span>Force exact enumeration</span>
                </label>
                <button id="calc">Calculate Equity</button>
                <div class="error" id="error-equity"></div>
                
                <div class="result" id="result-equity">
                    <h3>Equity Result</h3>
                    <div class="bar-container">
                        <div class="bar-hero" id="barHero">0%</div>
                        <div class="bar-villain" id="barVillain">0%</div>
                    </div>
                    <div class="row">
                        <span>Method</span>
                        <span id="method">—</span>
                    </div>
                    <div class="row">
                        <span>Sample Size</span>
                        <span id="sample">—</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Hand Evaluator Panel -->
        <div class="panel" id="panel-eval">
            <div class="card">
                <div class="field">
                    <label>Enter 5 Cards</label>
                    <input type="text" id="hand-input" value="AsKsQsJsTs" placeholder="e.g. AsKsQsJsTs">
                </div>
                <button id="eval-btn">Evaluate Hand</button>
                <div class="error" id="error-eval"></div>
                
                <div class="result" id="result-eval">
                    <h3>Hand Evaluation</h3>
                    <div class="hand-display" id="hand-display"></div>
                    <div class="hand-category" id="hand-category"></div>
                </div>
            </div>
        </div>

        <p class="footer">Built with Rust + WebAssembly</p>
    </div>

    <script type="module">
        import init, { equity_heads_up, eval_hand } from './wasm/openpoker_wasm.js';
        
        let wasmReady = false;
        
        async function loadWasm() {
            await init();
            wasmReady = true;
        }
        
        loadWasm();

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
            });
        });

        // Equity Calculator
        document.getElementById('calc').addEventListener('click', async () => {
            const btn = document.getElementById('calc');
            const errorEl = document.getElementById('error-equity');
            const resultEl = document.getElementById('result-equity');
            
            if (!wasmReady) {
                errorEl.textContent = 'WASM module not loaded yet. Please wait...';
                errorEl.classList.add('show');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'Calculating...';
            errorEl.classList.remove('show');
            resultEl.classList.remove('show');
            
            try {
                const hero = document.getElementById('hero').value.trim();
                const villain = document.getElementById('villain').value.trim();
                const board = document.getElementById('board').value.trim();
                const exact = document.getElementById('exact').checked;
                
                const json = equity_heads_up(hero, villain, board, exact);
                const data = JSON.parse(json);
                
                const heroPct = (data.hero_equity * 100).toFixed(2);
                const villainPct = (data.villain_equity * 100).toFixed(2);
                
                document.getElementById('barHero').style.width = heroPct + '%';
                document.getElementById('barHero').textContent = heroPct + '%';
                document.getElementById('barVillain').style.width = villainPct + '%';
                document.getElementById('barVillain').textContent = villainPct + '%';
                document.getElementById('method').textContent = data.is_exact ? 'Exact Enumeration' : 'Monte Carlo';
                document.getElementById('sample').textContent = data.sample_size.toLocaleString();
                
                resultEl.classList.add('show');
            } catch (e) {
                errorEl.textContent = 'Error: ' + e.message;
                errorEl.classList.add('show');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Calculate Equity';
            }
        });

        // Hand Evaluator
        function renderCard(cardStr) {
            const suit = cardStr.slice(-1);
            const rank = cardStr.slice(0, -1);
            const suitClass = 'suit-' + suit.toLowerCase();
            return `<span class="${suitClass}">${rank}${suit}</span>`;
        }

        document.getElementById('eval-btn').addEventListener('click', async () => {
            const btn = document.getElementById('eval-btn');
            const errorEl = document.getElementById('error-eval');
            const resultEl = document.getElementById('result-eval');
            
            if (!wasmReady) {
                errorEl.textContent = 'WASM module not loaded yet. Please wait...';
                errorEl.classList.add('show');
                return;
            }
            
            btn.disabled = true;
            errorEl.classList.remove('show');
            resultEl.classList.remove('show');
            
            try {
                const handStr = document.getElementById('hand-input').value.trim();
                const category = eval_hand(handStr);
                
                // Parse individual cards for display
                const cards = [];
                let i = 0;
                while (i < handStr.length) {
                    let rank = handStr[i];
                    i++;
                    if (i < handStr.length && handStr[i] === '0') {
                        rank += '0';
                        i++;
                    }
                    if (i < handStr.length) {
                        cards.push(rank + handStr[i]);
                        i++;
                    }
                }
                
                document.getElementById('hand-display').innerHTML = cards.map(renderCard).join(' ');
                document.getElementById('hand-category').textContent = category;
                
                resultEl.classList.add('show');
            } catch (e) {
                errorEl.textContent = 'Error: ' + e.message;
                errorEl.classList.add('show');
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
