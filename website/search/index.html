function highlightText(text, matches) {
    if (!matches || matches.length === 0) return text;
    let result = text;
    const indices = [];
    for (const m of matches) {
        for (const [start, end] of m.indices) {
            indices.push({start, end});
        }
    }
    indices.sort((a,b) => b.start - a.start);
    for (const {start, end} of indices) {
        result = result.slice(0, start) + '<mark class="highlight">' + result.slice(start, end + 1) + '</mark>' + result.slice(end + 1);
    }
    return result;
}

        if (currentFilter !== 'all' && item.type !== currentFilter) continue;
        const title = highlightText(item.title, r.matches?.filter(m => m.key === 'title'));
        const subtitle = highlightText(item.subtitle, r.matches?.filter(m => m.key === 'subtitle'));
        html += `<a href="../${item.url}" class="result-card">
            <div class="result-icon">${getTypeIcon(item.type)}</div>
            <div class="result-body">
                <div class="result-title">${title} <span class="result-type">${getTypeLabel(item.type)}</span></div>
                <div class="result-meta">${subtitle ? subtitle + ' · ' : ''}💰 ${item.cost} · 🛡️ ${item.safety} · 🌐 ${item.internet}Mbps${item.tags ? ' · ' + item.tags : ''}</div>
            </div>
            <div class="result-score">${item.score}</div>
        </a>`;
    }
    resultsDiv.innerHTML = html || '<div class="no-results">当前筛选条件下无匹配结果</div>';
}
document.getElementById('searchInput').addEventListener('input', (e) => { doSearch(e.target.value); });
document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        doSearch(document.getElementById('searchInput').value);
    });
});
initFuse();
</script>
</body>
</html>
