    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap"></noscript>

<body>
    <header class="header">
        <div class="header-inner">
            <a href="../" class="logo">
                <span class="logo-icon">◈</span>
                <span>数字游民指南</span>
            </a>
            <nav class="main-nav">
                <a href="../country/">国家</a>
                
                <a href="../visa/">签证</a>
                
                <a href="../articles/">文章</a>
                
                <a href="../search/">搜索</a>
                
            </nav>
            <a href="https://github.com/kfat77/digital-nomad-cn" class="github-btn" target="_blank">GitHub</a>
        </div>
    </header>

    <main class="articles-list-page">
        <div class="articles-list-header">
            <h1>文章</h1>
            <p>基于开源数据库生成的数据驱动深度文章</p>
            <p style="margin-top:8px;font-size:0.9rem;"><a href="../rss.xml" style="color:#3b82f6;text-decoration:none;">📡 RSS 订阅</a></p>
        </div>
        <div class="articles-grid" id="articles-grid"></div>
    </main>

    <footer class="footer" style="margin-top: 60px;">
        <div class="footer-inner">
            <p> 数字游民指南 · 开源全球流动数据平台</p>
            <p><a href="https://github.com/kfat77/digital-nomad-cn">GitHub</a> · </p>
        </div>
    </footer>

    <script>
        fetch('articles.json')
            .then(r => r.json())
            .then(articles => {
                const grid = document.getElementById('articles-grid');
                grid.innerHTML = articles.map(a => {
                    const tags = a.tags.map(t => `<span class="article-tag">${t}</span>`).join('');
                    return `
                        <a href="${a.slug}/" class="article-card">
                            <div class="article-card-tags">${tags}</div>
                            <h2>${a.title}</h2>
                            <p>${a.description}</p>
                            <div class="article-card-meta">${a.date}</div>
                        </a>
                    `;
                }).join('');
            })
            .catch(e => {
                document.getElementById('articles-grid').innerHTML = '<p style="text-align:center;color:#94a3b8">加载文章失败，请刷新重试。</p>';
            });
    </script>
  <script src="../lang-switcher.js" defer></script>
</body>
</html>
