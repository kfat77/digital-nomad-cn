    const flagMap = {"argentina": "🇦🇷", "australia": "🇦🇺", "austria": "🇦🇹", "brazil": "🇧🇷", "canada": "🇨🇦", "chile": "🇨🇱", "croatia": "🇭🇷", "cyprus": "🇨🇾", "denmark": "🇩🇰", "estonia": "🇪🇪", "france": "🇫🇷", "georgia": "🇬🇪", "germany": "🇩🇪", "greece": "🇬🇷", "hongkong": "🇭🇰", "iceland": "🇮🇸", "indonesia": "🇮🇩", "ireland": "🇮🇪", "japan": "🇯🇵", "kazakhstan": "🇰🇿", "macao": "🇲🇴", "malaysia": "🇲🇾", "mexico": "🇲🇽", "mongolia": "🇲🇳", "morocco": "🇲🇦", "nepal": "🇳🇵", "netherlands": "🇳🇱", "newzealand": "🇳🇿", "norway": "🇳🇴", "philippines": "🇵🇭", "portugal": "🇵🇹", "singapore": "🇸🇬", "southkorea": "🇰🇷", "spain": "🇪🇸", "srilanka": "🇱🇰", "switzerland": "🇨🇭", "thailand": "🇹🇭", "turkey": "🇹🇷", "uae": "🇦🇪", "uk": "🇬🇧", "usa": "🇺🇸", "vietnam": "🇻🇳"};
    
    function initSelectors(){
        const opts = Object.values(countryData).sort((a,b)=>a.name.localeCompare(b.name,'zh'));
        [0,1,2,3].forEach(i=>{
            const sel = document.getElementById('sel'+i);
            opts.forEach(c=>{ const o=document.createElement('option');o.value=c.id;o.textContent=c.name;sel.appendChild(o); });
        });
    }
    function getFlag(id){ return flagMap[id]||'🏳️'; }
    function getColor(i){ return ['#2563eb','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899'][i%6]; }
    function getVisaBadge(status){
        if(status==='免签') return '<span class="badge badge-visa-free">免签</span>';
        if(status==='落地签') return '<span class="badge badge-visa-on-arrival">落地签</span>';
        if(status==='电子签'||status==='ETA') return '<span class="badge badge-visa-on-arrival">'+status+'</span>';
        return '<span class="badge badge-visa-required">需签证</span>';
    }
    function getDNVBadge(has){ return has?'<span class="badge badge-dnv-yes">✓ 有</span>':'<span class="badge badge-dnv-no">—</span>'; }
    
    function compare(){
        const selected = [0,1,2,3].map(i=>document.getElementById('sel'+i).value).filter(v=>v);
        if(selected.length<2){ alert('请至少选择2个国家'); return; }
        const results = selected.map(id=>countryData[id]);
        const maxCost = Math.max(...results.map(c=>c.cost_of_living_index||0));
        const maxRent = Math.max(...results.map(c=>c.rent_index||0));
        const maxGDP = Math.max(...results.map(c=>c.gdp_per_capita_usd||0));
        const maxNet = Math.max(...results.map(c=>c.internet_speed_avg_mbps||0));
        const maxHDI = Math.max(...results.map(c=>c.hdi||0));
        const maxScore = Math.max(...results.map(c=>c.digital_nomad_score||0));
        const maxSafety = Math.max(...results.map(c=>c.safety_index||0));
        
        let html = '<table class="comparison-table"><thead><tr><th>指标</th>';
        results.forEach(c=>{ html+=`<th><div class="country-name"><span class="flag">${getFlag(c.id)}</span>${c.name}</div></th>`; });
        html += '</tr></thead><tbody>';
        
        const rows = [
            {label:'数字游民评分',key:'digital_nomad_score',max:maxScore,type:'score'},
            {label:'生活成本指数',key:'cost_of_living_index',max:maxCost,type:'cost'},
            {label:'租金指数',key:'rent_index',max:maxRent,type:'cost'},
            {label:'安全指数',key:'safety_index',max:maxSafety,type:'score'},
            {label:'平均网速 (Mbps)',key:'internet_speed_avg_mbps',max:maxNet,type:'net'},
            {label:'人均GDP (USD)',key:'gdp_per_capita_usd',max:maxGDP,type:'money'},
            {label:'HDI',key:'hdi',max:maxHDI,type:'score'},
            {label:'中国护照签证',key:'china_passport_visa_status',type:'visa'},
            {label:'数字游民签证',key:'has_digital_nomad_visa',type:'dnv'},
            {label:'货币',key:'currency',type:'text'},
            {label:'官方语言',key:'languages',type:'text'},
            {label:'地区',key:'region',type:'region'},
        ];
        
        rows.forEach(row=>{
            html += `<tr><td>${row.label}</td>`;
            results.forEach(c=>{
                let val = c[row.key];
                if(row.type==='score'){
                    const pct = row.max?((val||0)/row.max*100):0;
                    html += `<td><div class="metric-cell"><span class="metric-value">${val||'—'}</span><div class="metric-bar"><div class="metric-bar-fill" style="width:${pct}%;background:${getColor(results.indexOf(c))}"></div></div></div></td>`;
                }else if(row.type==='cost'){
                    const pct = row.max?((val||0)/row.max*100):0;
                    html += `<td><div class="metric-cell"><span class="metric-value">${val||'—'}</span><div class="metric-bar"><div class="metric-bar-fill" style="width:${pct}%;background:${pct>80?'#ef4444':pct>50?'#f59e0b':'#10b981'}"></div></div></div></td>`;
                }else if(row.type==='net'){
                    const pct = row.max?((val||0)/row.max*100):0;
                    html += `<td><div class="metric-cell"><span class="metric-value">${val||'—'}</span><div class="metric-bar"><div class="metric-bar-fill" style="width:${pct}%;background:${pct>60?'#10b981':'#f59e0b'}"></div></div></div></td>`;
                }else if(row.type==='money'){
                    html += `<td><span class="metric-value">$${(val||0).toLocaleString()}</span></td>`;
                }else if(row.type==='visa'){
                    html += `<td>${getVisaBadge(val)}<br><small style="color:var(--muted);font-size:12px">${c.china_passport_visa_note||''}</small></td>`;
                }else if(row.type==='dnv'){
                    html += `<td>${getDNVBadge(val)}</td>`;
                }else if(row.type==='region'){
                    html += `<td><span class="region-tag">${val}</span></td>`;
                }else{
                    html += `<td>${Array.isArray(val)?val.join(', '):val}</td>`;
                }
            });
            html += '</tr>';
        });
        html += '</tbody></table>';
        
        html += '<div class="charts-row">';
        ['digital_nomad_score','cost_of_living_index','internet_speed_avg_mbps','safety_index'].forEach((key,idx)=>{
            const titles = ['数字游民友好度','生活成本对比','网速对比 (Mbps)','安全指数'];
            const maxMap = {digital_nomad_score:maxScore,cost_of_living_index:maxCost,internet_speed_avg_mbps:maxNet,safety_index:maxSafety};
            const maxV = maxMap[key];
            const sorted = [...results].sort((a,b)=>(b[key]||0)-(a[key]||0));
            html += `<div class="chart-card"><h3>${titles[idx]}</h3><div class="bar-chart">`;
            sorted.forEach(c=>{
                const pct = maxV?((c[key]||0)/maxV*100):0;
                const bg = key==='cost_of_living_index'?(pct>80?'#ef4444':pct>50?'#f59e0b':'#10b981'):getColor(results.indexOf(c));
                html += `<div class="bar-item"><span class="bar-label">${getFlag(c.id)} ${c.name}</span><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${bg}"></div><span class="bar-value">${c[key]||'—'}</span></div></div>`;
            });
            html += '</div></div>';
        });
        html += '</div>';
        
        document.getElementById('results').innerHTML = html;
        document.querySelectorAll('.metric-bar-fill,.bar-fill').forEach(el=>{const w=el.style.width;el.style.width='0';setTimeout(()=>el.style.width=w,50);});
    }
    function resetAll(){ [0,1,2,3].forEach(i=>document.getElementById('sel'+i).value=''); document.getElementById('results').innerHTML=''; }
    document.querySelectorAll('.preselect-btns button').forEach(btn=>{
        btn.addEventListener('click',()=>{
            document.querySelectorAll('.preselect-btns button').forEach(b=>b.classList.remove('active'));
            btn.classList.add('active');
            const set = presets[btn.dataset.set];
            if(!set) return;
            [0,1,2,3].forEach(i=>{ const sel=document.getElementById('sel'+i); sel.value=set[i]||''; });
            compare();
        });
    });
    initSelectors();
    </script>
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('../sw.js').catch(() => {});
        });
    }
    </script>
  <script src="../lang-switcher.js" defer></script>
    <script src="../motion.js" defer></script>
</body>
</html>
