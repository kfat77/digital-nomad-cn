name: 🚀 Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Validate data
        run: node scripts/validate-data.js

      - name: Generate country pages
        run: node scripts/generate-country-pages.js

      - name: Generate changelog from commits
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo '')
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" "$PREVIOUS_TAG"..HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" -20)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## What's Changed
            ${{ steps.changelog.outputs.CHANGELOG }}

            ## Data Assets
            - [countries.json](https://github.com/${{ github.repository }}/blob/main/website/api/countries.json) — 60 countries with deep-dive data
            - [cities.json](https://github.com/${{ github.repository }}/blob/main/website/api/cities.json) — 122 cities
            - [Country pages](https://github.com/${{ github.repository }}/tree/main/website/country/) — 60 bilingual country guides
          generate_release_notes: true
