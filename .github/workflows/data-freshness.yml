name: Data Freshness Monitor

on:
  schedule:
    # Run every Sunday at 02:00 UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  check-freshness:
    name: Check Data Freshness
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Check data staleness
        id: freshness
        run: |
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('datasets/countries.json', 'utf8'));
            const now = new Date();
            const staleThreshold = 90 * 24 * 60 * 60 * 1000; // 90 days
            const warningThreshold = 60 * 24 * 60 * 60 * 1000; // 60 days
            
            const stale = [];
            const warning = [];
            
            for (const country of data.countries || []) {
              const lastUpdated = country.metadata?.lastUpdated;
              if (!lastUpdated) {
                stale.push({ country: country.id, days: 'never' });
                continue;
              }
              
              const updated = new Date(lastUpdated);
              const age = now - updated;
              const days = Math.floor(age / (24 * 60 * 60 * 1000));
              
              if (age > staleThreshold) {
                stale.push({ country: country.id, days, date: lastUpdated });
              } else if (age > warningThreshold) {
                warning.push({ country: country.id, days, date: lastUpdated });
              }
            }
            
            console.log('📊 Data Freshness Report');
            console.log('========================');
            console.log('Total countries:', (data.countries || []).length);
            console.log('Stale (>90 days):', stale.length);
            console.log('Warning (>60 days):', warning.length);
            console.log('Fresh (<60 days):', (data.countries || []).length - stale.length - warning.length);
            console.log('');
            
            if (stale.length > 0) {
              console.log('🔴 Stale countries (need update):');
              stale.forEach(s => console.log('  -', s.country, '(', s.days, 'days ago)' ));
            }
            
            if (warning.length > 0) {
              console.log('🟡 Warning countries (aging):');
              warning.forEach(w => console.log('  -', w.country, '(', w.days, 'days ago)' ));
            }
            
            // Write report for potential issue creation
            const report = { stale, warning, total: (data.countries || []).length, generated: now.toISOString() };
            fs.writeFileSync('freshness-report.json', JSON.stringify(report, null, 2));
          "

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: freshness-report
          path: freshness-report.json

      - name: Create freshness issue (if stale data found)
        if: github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('freshness-report.json', 'utf8'));
            
            if (report.stale.length === 0) return;
            
            const body = `## 📊 Weekly Data Freshness Report
            
Generated: ${report.generated}

| Metric | Count |
|--------|-------|
| Total Countries | ${report.total} |
| 🔴 Stale (>90 days) | ${report.stale.length} |
| 🟡 Warning (>60 days) | ${report.warning.length} |
| 🟢 Fresh (<60 days) | ${report.total - report.stale.length - report.warning.length} |

### 🔴 Stale Countries Needing Updates

${report.stale.map(s => `- **${s.country}**: ${s.days} days ago (${s.date || 'unknown'})`).join('\n')}

${report.warning.length > 0 ? `### 🟡 Warning Countries\n\n${report.warning.map(w => `- **${w.country}**: ${w.days} days ago`).join('\n')}` : ''}

---
*This issue was auto-generated by the Data Freshness Monitor workflow.*
`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[data] Weekly freshness report - ${report.stale.length} countries need updates`,
              body: body,
              labels: ['data', 'automation', 'triage']
            });
