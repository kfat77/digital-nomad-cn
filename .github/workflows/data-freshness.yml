name: CI / Data Freshness Check

on:
  schedule:
    # Run every Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-freshness:
    name: Check Data Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check data freshness
        run: |
          node -e "
            const fs = require('fs');
            const index = JSON.parse(fs.readFileSync('datasets/index.json', 'utf-8'));
            const lastUpdated = new Date(index.lastUpdated);
            const now = new Date();
            const daysSinceUpdate = Math.floor((now - lastUpdated) / (1000 * 60 * 60 * 24));
            
            console.log('Last updated:', index.lastUpdated);
            console.log('Days since update:', daysSinceUpdate);
            
            if (daysSinceUpdate > 30) {
              console.log('::warning::Data is older than 30 days');
              process.exit(1);
            }
          "

      - name: Create issue if data is stale
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ Dataset needs update',
              body: 'The dataset has not been updated in over 30 days. Please review and update the data.',
              labels: ['data-update', 'automated']
            });
