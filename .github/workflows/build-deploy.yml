name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'datasets/**'
      - 'schemas/**'
      - 'scripts/**'
      - '.github/workflows/build-deploy.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate data
        run: npm run validate

      - name: Sync datasets to website
        run: npm run sync:data

      - name: Build website
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          commit_message: 'deploy: auto build from ${{ github.sha }}'
