name: Sync Simpanda Giffgaff stock

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-stock:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SUPABASE_URL: https://xbebxoxgghyjtwaqxoes.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Read supplier inventory and update the store
        run: node scripts/sync-simpanda-stock.mjs
