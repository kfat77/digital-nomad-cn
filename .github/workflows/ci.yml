name: 🔄 CI / Build, Generate & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Validate JSON data
        run: node scripts/validate-data.js

      - name: Validate country pages can be generated
        run: node scripts/generate-country-pages.js

  generate-and-sync:
    name: Generate Pages & Sync to Docs
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Generate country pages
        run: node scripts/generate-country-pages.js

      - name: Bump SW cache version
        run: node scripts/bump-sw-cache.js

      - name: Sync website to docs
        run: node scripts/sync-to-docs.js

      - name: Check for changes
        id: check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            git diff --stat
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push generated changes
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "ci: auto-generate pages & bump SW cache [$(date -u +%Y-%m-%d %H:%M UTC)]

          - Regenerated country pages from latest JSON data
          - Bumped Service Worker cache version
          - Synced website/ to docs/ for GitHub Pages

          Automated by CI/CD pipeline."
          git push

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: generate-and-sync
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          path: docs/
