name: Sync Website to Docs

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Generate country pages
        run: node scripts/generate-country-pages.js

      - name: Bump SW cache
        run: node scripts/bump-sw-cache.js

      - name: Sync website/ to docs/
        run: node scripts/sync-to-docs.js

      - name: Check for changes
        id: check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            git diff --stat
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "ci: sync website to docs & bump SW cache

          - Auto-generated country pages from latest JSON
          - Bumped Service Worker cache for cache invalidation
          - Synced all website changes to docs/ for GitHub Pages"
          git push