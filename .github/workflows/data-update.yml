name: Data Update & Monitor

on:
  schedule:
    # Run monthly on the 1st at 06:00 UTC
    - cron: '0 6 1 * *'
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update even if no changes'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Backup current data
        run: |
          cp website/api/countries.json website/api/countries.json.backup
          cp website/api/stats.json website/api/stats.json.backup

      - name: Run data update script
        id: update
        run: |
          python website/scripts/update-data.py
        continue-on-error: false

      - name: Run anomaly detection
        id: monitor
        run: |
          python website/scripts/data-monitor.py
        continue-on-error: true

      - name: Sync website/ to docs/ for GitHub Pages deployment
        run: |
          # Ensure docs/ is an exact mirror of website/ (GitHub Pages source)
          rsync -a --delete website/ docs/
          echo "Synced website/ to docs/"

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No data changes detected."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Data changes detected."
            git diff --stat
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "data: automated exchange rate update & docs sync [$(date -u +%Y-%m-%d)]

          - Updated exchange rates from exchangerate-api.com
          - Synced website/ to docs/ for GitHub Pages deployment
          - Refreshed data freshness metadata
          - See DATA_UPDATE_REPORT.md for details"
          git push origin main

      - name: Create anomaly issue
        if: steps.monitor.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = '';
            try {
              report = fs.readFileSync('DATA_MONITOR_REPORT.md', 'utf8');
            } catch (e) {
              report = 'Anomaly detection failed. Please check the workflow logs.';
            }
            
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Data Anomaly Detected - ${new Date().toISOString().split('T')[0]}`,
              body: `## Automated Data Monitor Report

          ${report}

          ---
          *This issue was automatically generated by the data monitoring workflow.*
          *To investigate: check the [workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId})*`,
              labels: ['data-anomaly', 'automated'],
            });
            console.log(`Created issue #${issue.data.number}`);

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-update-reports
          path: |
            DATA_UPDATE_REPORT.md
            DATA_MONITOR_REPORT.md
          if-no-files-found: ignore

  notify-no-change:
    runs-on: ubuntu-latest
    needs: update-data
    if: needs.update-data.outputs.changed == 'false' && github.event_name == 'schedule'
    steps:
      - name: Log no changes
        run: |
          echo "No data changes detected this month. All rates are up to date."
