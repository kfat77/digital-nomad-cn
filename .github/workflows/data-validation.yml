name: 📊 Data Validation

on:
  push:
    paths:
      - 'website/api/**'
      - 'scripts/validate-data.js'
  pull_request:
    paths:
      - 'website/api/**'
      - 'scripts/validate-data.js'
      - 'scripts/generate-country-pages.js'

jobs:
  validate:
    name: Validate Data & Generation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate JSON Schema
        run: node scripts/validate-data.js

      - name: Test page generation
        run: node scripts/generate-country-pages.js

      - name: Check for uncommitted generated changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "❌ Generated pages differ from committed. Run 'node scripts/generate-country-pages.js' and commit."
            git diff --stat
            exit 1
          else
            echo "✅ All generated pages are up to date."
          fi
