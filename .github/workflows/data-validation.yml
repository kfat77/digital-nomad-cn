name: Data Validation

on:
  pull_request:
    paths:
      - 'datasets/**'
      - 'schemas/**'
  push:
    branches: [main]
    paths:
      - 'datasets/**'
      - 'schemas/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check JSON syntax
        run: |
          # Validate all JSON files under datasets/ have valid syntax
          find datasets -name '*.json' -exec node -e "JSON.parse(require('fs').readFileSync('{}', 'utf8'))" \; || exit 1

      - name: Check dataset sync
        run: |
          # Verify datasets/countries.json and website/api/countries.json are in sync
          if [ -f datasets/countries.json ] && [ -f website/api/countries.json ]; then
            diff -q datasets/countries.json website/api/countries.json || echo "⚠️ datasets/countries.json 与 website/api/countries.json 不同步"
          fi
        continue-on-error: true
