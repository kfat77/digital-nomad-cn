name: Data Validation

on:
  pull_request:
    paths:
      - 'datasets/**'
      - 'schemas/**'
      - 'scripts/validate-data.js'
  push:
    branches: [main]
    paths:
      - 'datasets/**'
      - 'schemas/**'
      - 'scripts/validate-data.js'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate data against schemas
        run: npm run validate

      - name: Check data extraction from source
        run: |
          npm run extract:data
          git diff --exit-code datasets/countries.json || (echo "⚠️ datasets/countries.json 与 website/countries-data.js 不同步，请运行 npm run extract:data" && exit 1)
        continue-on-error: true

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: datasets/_validation-report.json
