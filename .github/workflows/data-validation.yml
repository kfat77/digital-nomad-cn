name: Data Validation

on:
  pull_request:
    paths:
      - 'datasets/**'
      - 'schemas/**'
      - 'tests/**'
      - 'package.json'
      - '.github/workflows/data-validation.yml'
  push:
    branches: [main]
    paths:
      - 'datasets/**'
      - 'schemas/**'
      - 'tests/**'
      - 'package.json'
      - '.github/workflows/data-validation.yml'

permissions:
  contents: read

jobs:
  check:
    name: Lint and validate data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run check
