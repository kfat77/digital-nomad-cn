name: Data Validation

on:
  pull_request:
    paths:
      - 'datasets/**'
      - 'schemas/**'
      - 'scripts/validate-data.js'
  push:
    branches: [main]
    paths:
      - 'datasets/**'
      - 'schemas/**'
      - 'scripts/validate-data.js'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Validate data against schemas
        run: npm run validate

      - name: Check data extraction from source
        run: |
          npm run extract:data
          git diff --exit-code datasets/countries.json || (echo "⚠️ datasets/countries.json 与 website/countries-data.js 不同步，请运行 npm run extract:data" && exit 1)

      - name: Comment PR with validation report
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const report = require('./datasets/_validation-report.json');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ❌ 数据校验失败\n\n请检查 datasets/ 目录下的数据是否符合 schemas/ 中定义的 Schema。\n\n运行 \`npm run validate\`  locally 查看详细错误。`
            });
