name: Close stale issues and PRs

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had recent activity. 
            It will be closed in 7 days if no further activity occurs.
            
            If this issue is still relevant, please comment or add the `not-stale` label.
          stale-pr-message: |
            This pull request has been automatically marked as stale because it has not had recent activity. 
            It will be closed in 7 days if no further activity occurs.
            
            If this PR is still being worked on, please comment or push new commits.
          close-issue-message: |
            This issue has been closed due to inactivity. 
            If you believe this is still relevant, please open a new issue with updated information.
          close-pr-message: |
            This pull request has been closed due to inactivity. 
            If you would like to continue working on this, please open a new PR.
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          exempt-issue-labels: 'not-stale,pinned,help wanted,good first issue'
          exempt-pr-labels: 'not-stale,pinned,work-in-progress'
          days-before-stale: 30
          days-before-close: 7
          delete-branch: false
