name: Auto-Update Sitemap

on:
  push:
    branches: [main]
    paths:
      - 'website/**/*.html'
      - '.github/workflows/update-sitemap.yml'
  workflow_dispatch:

jobs:
  update-sitemap:
    name: Update Sitemap.xml
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate sitemap
        run: node scripts/generate-sitemap.js

      - name: Check for changes
        id: check
        run: |
          if [ -n "$(git status --porcelain website/sitemap.xml docs/sitemap.xml)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            git diff --stat website/sitemap.xml docs/sitemap.xml
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add website/sitemap.xml docs/sitemap.xml
          git commit -m "ci: auto-update sitemap [$(date -u +%Y-%m-%d %H:%M UTC)] [skip ci]"
          git push
