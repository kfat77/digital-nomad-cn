title: 💬 General
labels: ["discussion"]
body:
  - type: markdown
    attributes:
      value: |
        Use this category for general questions, ideas, and community discussions.

  - type: textarea
    id: topic
    attributes:
      label: Topic
      description: What would you like to discuss?
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Question
        - Idea
        - Feedback
        - Show and Tell
        - Community

  - type: textarea
    id: details
    attributes:
      label: Details
      description: Provide more context
