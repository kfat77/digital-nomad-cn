name: 🐛 Bug 报告
description: 报告网站功能、数据或显示问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提交 Bug 报告！请尽可能详细地描述问题，帮助我们快速定位和修复。
  - type: input
    id: page-url
    attributes:
      label: 问题页面 URL
      description: 出现问题的页面链接
      placeholder: https://kfat77.github.io/digital-nomad-cn/country/portugal/
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰简洁地描述 Bug 是什么
      placeholder: 国家详情页的数字游民评分显示为 NaN
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 如何一步步复现这个问题
      placeholder: |
        1. 打开 https://kfat77.github.io/digital-nomad-cn/country/portugal/
        2. 滚动到评分区域
        3. 观察到数字游民评分为 NaN
    validations:
      required: false
  - type: input
    id: browser
    attributes:
      label: 浏览器 / 设备
      description: 你使用的浏览器和操作系统
      placeholder: Chrome 120 / Windows 11
    validations:
      required: false
  - type: textarea
    id: screenshot
    attributes:
      label: 截图
      description: 如果有截图，请直接粘贴或上传
    validations:
      required: false
  - type: checkboxes
    id: confirm
    attributes:
      label: 确认
      options:
        - label: 我已经搜索过现有的 Issue，确认没有重复报告
          required: true
