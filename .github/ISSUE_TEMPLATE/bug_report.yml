---
name: 🐛 Bug Report
about: 报告功能缺陷或页面错误
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: 问题描述
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开 xxx 页面
        2. 点击 xxx
        3. 出现 xxx 错误
  - type: input
    id: browser
    attributes:
      label: 浏览器环境
      placeholder: Chrome 120 / macOS
  - type: textarea
    id: screenshot
    attributes:
      label: 截图（如有）
---