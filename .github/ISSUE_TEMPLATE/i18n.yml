name: 🌍 Internationalization (i18n)
about: 提交翻译错误、多语言支持请求或国际化改进建议
title: '[i18n] '
labels: ['i18n', 'triage']
body:
  - type: dropdown
    id: type
    attributes:
      label: 问题类型
      options:
        - 翻译错误 / 不准确
        - 缺少某种语言支持
        - hreflang 标签问题
        - 语言切换器问题
        - RTL (从右到左) 语言支持
        - 日期/数字/货币格式
        - 其他
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 具体的国际化问题
      placeholder: |
        例如：
        - 日本国家页面的英文版标题仍然是中文
        - 法语翻译中 " visa " 一词使用不当
        - 缺少西班牙语支持
    validations:
      required: true

  - type: input
    id: page
    attributes:
      label: 相关页面 URL
      placeholder: https://kfat77.github.io/digital-nomad-cn/en/country/japan/

  - type: textarea
    id: current_text
    attributes:
      label: 当前文本（如有）
      description: 如果有翻译错误，请提供当前文本
      placeholder: |
        当前：日本 - 数字游民指南
        应为：Japan - Digital Nomad Guide

  - type: textarea
    id: suggestion
    attributes:
      label: 改进建议
      description: 具体的改进方案或翻译建议
      placeholder: |
        建议将所有国家页面的英文版标题统一为 "{Country} - Digital Nomad Guide" 格式

  - type: checkboxes
    id: languages
    attributes:
      label: 相关语言
      options:
        - label: 中文 (zh-CN)
        - label: 英文 (en)
        - label: 其他语言（请在描述中说明）
