name: ❓ Question
description: Ask a question about the project, data, or how to contribute
title: "[Question] "
labels: ["question", "triage"]
body:
  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
      placeholder: "How do I update visa data for a country?"
    validations:
      required: true

  - type: checkboxes
    id: checked
    attributes:
      label: Have you checked these resources?
      options:
        - label: README.md
          required: false
        - label: CONTRIBUTING.md
          required: false
        - label: Existing Issues and Discussions
          required: false
        - label: Wiki
          required: false
