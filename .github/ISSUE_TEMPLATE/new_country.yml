    id: country_name
    attributes:
      label: 国家中文名
  - type: input
    id: country_name_en
    attributes:
      label: 国家英文名
  - type: textarea
    id: reason
    attributes:
      label: 为什么推荐添加这个国家？
      placeholder: 描述该国家对数字游民的吸引力
  - type: checkboxes
    id: checklist
    attributes:
      label: 数据准备清单
      options:
        - label: 已确认该国对中国护照签证政策
        - label: 已收集生活成本、安全指数、网速等基础数据
        - label: 已确认是否有数字游民签证
---