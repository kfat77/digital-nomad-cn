name: 🔍 SEO / AI Search Improvement
about: 提交 SEO 优化建议、结构化数据改进或 AI Search 可见性增强
title: '[SEO] '
labels: ['seo', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        感谢您对项目 SEO 和 AI Search 优化的关注！

  - type: dropdown
    id: type
    attributes:
      label: 优化类型
      options:
        - 结构化数据 (JSON-LD / Schema.org)
        - Meta 标签优化
        - 内部链接优化
        - 页面速度 / Core Web Vitals
        - AI Search 可见性 (llms.txt / AI 摘要)
        - 国际化 / hreflang
        - 其他
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: 当前状态
      description: 描述当前页面或功能的 SEO 状况
      placeholder: |
        例如：
        - 首页缺少 Article 结构化数据
        - 国家页面 description 为空
        - sitemap 未包含新添加的页面
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: 优化建议
      description: 具体的改进方案
      placeholder: |
        例如：
        - 在国家页面添加 Article 类型的 JSON-LD
        - 为所有页面生成唯一的 meta description
        - 更新 sitemap.xml 包含最新页面
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: 预期影响
      description: 此优化对搜索排名或用户体验的影响
      placeholder: |
        例如：
        - 提升 Google 富媒体搜索结果展示率
        - 减少重复内容惩罚风险
        - 提高 AI 爬虫对页面内容的理解

  - type: textarea
    id: references
    attributes:
      label: 参考资源
      description: Google 文档、SEO 工具报告或其他参考资料
      placeholder: |
        - Google Search Central 指南链接
        - Schema.org 规范链接
        - SEO 审计工具报告截图
