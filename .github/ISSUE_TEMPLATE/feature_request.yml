name: ✨ 功能建议
description: 提出新功能、改进或用户体验优化建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提出功能建议！请描述你的想法和预期效果。
  - type: textarea
    id: problem
    attributes:
      label: 问题 / 痛点
      description: 这个功能解决什么问题？
      placeholder: 目前无法对比超过 4 个国家的数据...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 建议的解决方案
      description: 你希望如何实现？
      placeholder: 支持添加更多国家到对比列表中...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你有没有考虑过其他实现方式？
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: 补充说明
      description: 任何其他背景信息或参考链接
    validations:
      required: false
