<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="giffgaff 电话卡订单物流查询，输入订单号与查询码查看发货状态。"
    />
    <title>查询物流 · giffgaff 电话卡 · Nomad Essentials</title>
    <link rel="stylesheet" href="../styles.css" />
    <style>
      .track-wrap{max-width:560px;margin:0 auto;padding:0 32px 80px}
      .track-form{margin-top:40px}
      .track-form .form-row{margin-bottom:20px}
      .track-form label{display:block;margin-bottom:8px;font-weight:650;font-size:14px}
      .track-form input{width:100%;padding:14px 16px;border:1.5px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);font-size:16px;font-family:inherit;transition:border-color .2s ease,box-shadow .2s ease}
      .track-form input:focus{outline:none;border-color:var(--ink);box-shadow:0 0 0 3px rgba(22,51,0,.08)}
      .track-form .button{width:100%;margin-top:8px;font-size:16px}
      .track-error{margin-top:16px;padding:14px 18px;border-radius:12px;background:#fcebeb;color:#a32d2d;font-size:14px;display:none}
      .track-result{margin-top:32px;display:none}
      .track-result .result-card{padding:28px;border:1.5px solid var(--line);border-radius:20px;background:#fff}
      .track-result .result-status{text-align:center;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--line)}
      .track-result .result-status .status-badge{display:inline-block;padding:6px 20px;border-radius:999px;font-size:16px;font-weight:700}
      .s-pending{background:#ffd9a3;color:#854f0b}
      .s-confirmed{background:#d5efff;color:#0c447c}
      .s-shipped{background:#e9f8dd;color:#085041}
      .s-completed{background:#dff6d0;color:#234b13}
      .s-cancelled{background:#f1efe8;color:#5f5e5a}
      .track-result .result-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;font-size:15px}
      .track-result .result-row label{color:var(--muted);font-weight:650;font-size:13px;margin:0}
      .track-result .result-row p{margin:0;font-weight:500}
      .track-result .result-row .copyable{cursor:pointer;transition:color .2s}
      .track-result .result-row .copyable:hover{color:#54843d}
      .cs-block{margin-top:48px;padding:24px;border:1.5px solid var(--line);border-radius:20px;background:var(--mint)}
      .cs-block h4{margin:0 0 8px;font-size:16px}
      .cs-block p{margin:0;color:var(--muted);font-size:14px}
      .cs-block .cs-id{display:inline-block;margin-top:8px;padding:6px 14px;border-radius:999px;background:#fff;border:1.5px solid var(--line);font-weight:650;font-size:14px}
      @media(max-width:700px){.track-wrap{padding:0 20px 60px}}
    </style>
  </head>
  <body>
    <div class="notice" data-notice>
      <p>请输入下单时生成的订单号与查询码进行查询。</p>
      <button type="button" aria-label="关闭提示" data-notice-close>×</button>
    </div>
    <header class="site-header">
      <a class="brand" href="../index.html" aria-label="Nomad Essentials 首页"
        ><span class="brand-mark">N</span><span>nomad essentials</span></a
      ><button
        class="menu-toggle"
        type="button"
        data-menu-toggle
        aria-expanded="false"
        aria-controls="site-nav"
      >
        菜单
      </button>
      <nav id="site-nav" class="site-nav" data-menu>
        <a href="../index.html">首页</a><a href="./">giffgaff 电话卡</a
        ><a href="./order.html">下单</a
        ><a class="nav-cta" href="./track.html" aria-current="page">查询物流</a
        ><a href="../index.html#securities">海外证券</a
        ><a href="../legal.html">法律法规</a>
      </nav>
    </header>
    <main>
      <section class="hero">
        <p class="eyebrow" data-reveal>订单物流查询</p>
        <h1 data-reveal>输入订单号<br />与查询码</h1>
        <p class="hero-copy" data-reveal>
          凭下单时生成的订单号与查询码，查看订单状态与物流信息。
        </p>
      </section>

      <section class="track-wrap">
        <div class="track-form" data-reveal>
          <div class="form-row">
            <label>订单号</label>
            <input type="text" id="track-order-number" placeholder="如 GF-20260721-0001" />
          </div>
          <div class="form-row">
            <label>查询码</label>
            <input type="text" id="track-code" placeholder="6 位查询码" maxlength="6" style="text-transform:uppercase" />
          </div>
          <div class="track-error" id="track-error"></div>
          <button class="button button-primary" id="track-btn">查询</button>
        </div>

        <div class="track-result" id="track-result">
          <div class="result-card" id="result-card"></div>
        </div>

        <div class="cs-block" data-reveal id="cs-block">
          <h4>联系客服</h4>
          <p id="cs-desc">如有疑问，请联系客服</p>
          <span class="cs-id" id="cs-wechat">微信客服</span>
        </div>
      </section>
    </main>
    <footer>
      <a class="brand" href="../index.html"
        ><span class="brand-mark">N</span><span>nomad essentials</span></a
      >
      <p>giffgaff 电话卡代购服务 · 资费与政策以运营商最新公告为准。</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" defer></script>
    <script src="../js/config.js" defer></script>
    <script src="../js/supabase-client.js" defer></script>
    <script src="../js/track.js" defer></script>
  </body>
</html>
