<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="giffgaff 电话卡订单管理后台" />
    <title>管理后台 · giffgaff 电话卡 · Nomad Essentials</title>
    <link rel="stylesheet" href="../styles.css" />
    <style>
      .admin-wrap{max-width:1100px;margin:0 auto;padding:0 32px 80px}
      .admin-login{max-width:400px;margin:60px auto;padding:40px;border:1.5px solid var(--line);border-radius:20px;background:#fff}
      .admin-login h3{margin:0 0 24px;text-align:center;font-size:24px;letter-spacing:-.04em}
      .admin-login .form-row{margin-bottom:16px}
      .admin-login .button{width:100%;margin-top:8px}
      .login-error{margin-top:12px;padding:10px 14px;border-radius:10px;background:#fcebeb;color:#a32d2d;font-size:13px;display:none}
      .admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:12px}
      .admin-header h2{margin:0;font-size:clamp(24px,3vw,32px);letter-spacing:-.05em}
      .logout-btn{padding:8px 18px;border-radius:999px;border:1.5px solid var(--line);background:#fff;color:var(--ink);font-weight:650;font-size:13px;cursor:pointer;transition:border-color .2s}
      .logout-btn:hover{border-color:var(--ink)}
      .filter-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
      .filter-btn{padding:6px 16px;border-radius:999px;border:1.5px solid var(--line);background:#fff;color:var(--muted);font-weight:650;font-size:13px;cursor:pointer;transition:all .2s}
      .filter-btn.active{background:var(--ink);color:#fff;border-color:var(--ink)}
      .admin-table{width:100%;border-collapse:collapse;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
      .admin-table th,.admin-table td{padding:12px 16px;text-align:left;border-bottom:1px solid var(--line);font-size:13px}
      .admin-table th{font-weight:650;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em;background:var(--cream)}
      .admin-table tbody tr{cursor:pointer;transition:background .15s}
      .admin-table tbody tr:hover{background:var(--mint)}
      .admin-table tbody tr.selected{background:#e9f8dd}
      .status-badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:650}
      .s-pending{background:#ffd9a3;color:#854f0b}
      .s-confirmed{background:#d5efff;color:#0c447c}
      .s-shipped{background:#e9f8dd;color:#085041}
      .s-completed{background:#dff6d0;color:#234b13}
      .s-cancelled{background:#f1efe8;color:#5f5e5a}
      .detail-panel{margin-top:24px;padding:28px;border:1.5px solid var(--line);border-radius:20px;background:#fff;display:none}
      .detail-panel h3{margin:0 0 20px;font-size:20px}
      .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px 24px;margin-bottom:24px}
      .detail-grid .item label{display:block;margin-bottom:4px;color:var(--muted);font-size:12px;font-weight:650}
      .detail-grid .item p{margin:0;font-size:15px;font-weight:500}
      .detail-grid .item.full{grid-column:1/-1}
      .detail-actions{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-top:20px;padding-top:20px;border-top:1px solid var(--line)}
      .detail-actions .form-row{margin:0;flex:1;min-width:180px}
      .detail-actions .form-row label{display:block;margin-bottom:6px;font-weight:650;font-size:13px}
      .detail-actions .form-row input,.detail-actions .form-row select{width:100%;padding:10px 14px;border:1.5px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);font-size:14px;font-family:inherit}
      .detail-actions .form-row input:focus,.detail-actions .form-row select:focus{outline:none;border-color:var(--ink)}
      .action-btn{padding:10px 20px;border-radius:999px;border:0;font-weight:700;font-size:14px;cursor:pointer;transition:transform .15s}
      .action-btn:active{transform:scale(.97)}
      .btn-save{background:var(--lime);color:#142d02}
      .btn-cancel{background:#fcebeb;color:#a32d2d}
      .save-msg{margin-top:12px;font-size:13px;font-weight:650;display:none}
      .save-msg.ok{color:#085041;display:block}
      .save-msg.err{color:#a32d2d;display:block}
      .empty-state{text-align:center;padding:60px 20px;color:var(--muted);font-size:15px}
      @media(max-width:700px){.admin-wrap{padding:0 16px 60px}.detail-grid{grid-template-columns:1fr}.admin-table{font-size:12px}.admin-table th,.admin-table td{padding:8px 10px}}
    </style>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="../index.html" aria-label="Nomad Essentials 首页"
        ><span class="brand-mark">N</span><span>nomad essentials</span></a
      ><button
        class="menu-toggle"
        type="button"
        data-menu-toggle
        aria-expanded="false"
        aria-controls="site-nav"
      >
        菜单
      </button>
      <nav id="site-nav" class="site-nav" data-menu>
        <a href="../index.html">首页</a><a href="../index.html#banking">银行卡</a
        ><a href="../index.html#phone">电话卡</a
        ><a href="../index.html#securities">海外证券</a
        ><a href="../index.html#ai-subscriptions">AI 订阅</a
        ><a href="./">giffgaff</a
        ><a href="./order.html">下单</a><a href="./track.html">查询物流</a
        ><a class="nav-cta" href="./admin.html" aria-current="page">管理后台</a
        ><a href="../legal.html">法律法规</a>
      </nav>
    </header>
    <main>
      <!-- 登录区域 -->
      <section class="admin-wrap" id="login-section">
        <div class="admin-login">
          <h3>管理后台登录</h3>
          <div class="form-row">
            <input type="email" id="login-email" placeholder="管理员邮箱" style="width:100%;padding:14px 16px;border:1.5px solid var(--line);border-radius:12px;font-size:15px;font-family:inherit" />
          </div>
          <div class="form-row">
            <input type="password" id="login-password" placeholder="密码" style="width:100%;padding:14px 16px;border:1.5px solid var(--line);border-radius:12px;font-size:15px;font-family:inherit" />
          </div>
          <div class="login-error" id="login-error"></div>
          <button class="button button-primary" id="login-btn">登录</button>
        </div>
      </section>

      <!-- 管理区域（登录后显示） -->
      <section class="admin-wrap" id="admin-section" style="display:none">
        <div class="admin-header">
          <h2>订单管理</h2>
          <button class="logout-btn" id="logout-btn">退出登录</button>
        </div>
        <div class="filter-bar" id="filter-bar">
          <button class="filter-btn active" data-filter="all">全部</button>
          <button class="filter-btn" data-filter="pending">待处理</button>
          <button class="filter-btn" data-filter="confirmed">已确认</button>
          <button class="filter-btn" data-filter="shipped">已发货</button>
          <button class="filter-btn" data-filter="completed">已完成</button>
          <button class="filter-btn" data-filter="cancelled">已取消</button>
        </div>
        <div id="table-container"></div>
        <div class="detail-panel" id="detail-panel"></div>
      </section>
    </main>
    <footer>
      <a class="brand" href="../index.html"
        ><span class="brand-mark">N</span><span>nomad essentials</span></a
      >
      <p>giffgaff 电话卡代购服务 · 管理后台。</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" defer></script>
    <script src="../js/config.js" defer></script>
    <script src="../js/supabase-client.js" defer></script>
    <script src="../js/admin.js" defer></script>
  </body>
</html>
