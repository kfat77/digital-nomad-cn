    function doSearch(query) {
        const resultsDiv = document.getElementById('results');
        if (!query.trim()) { resultsDiv.innerHTML = '<div class="no-results">输入关键词开始搜索</div>'; return; }
        if (!fuse) return;
        const results = fuse.search(query).slice(0, 20);
        if (results.length === 0) { resultsDiv.innerHTML = '<div class="no-results">未找到匹配结果，尝试其他关键词</div>'; return; }
        let html = '';
        for (const r of results) {
            const item = r.item;
            if (currentFilter !== 'all' && item.type !== currentFilter) continue;
            const title = highlightText(item.title, r.matches?.filter(m => m.key === 'title'));
            const subtitle = highlightText(item.subtitle, r.matches?.filter(m => m.key === 'subtitle'));
            html += `<a href="../${item.url}" class="result-card">
                <div class="result-icon">${getTypeIcon(item.type)}</div>
                <div class="result-body">
                    <div class="result-title">${title} <span class="result-type">${getTypeLabel(item.type)}</span></div>
                    <div class="result-meta">${subtitle ? subtitle + ' · ' : ''}💰 ${item.cost} · 🛡️ ${item.safety} · 🌐 ${item.internet}Mbps${item.tags ? ' · ' + item.tags : ''}</div>
                </div>
                <div class="result-score">${item.score}</div>
            </a>`;
        }
        resultsDiv.innerHTML = html || '<div class="no-results">当前筛选条件下无匹配结果</div>';
