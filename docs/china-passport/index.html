<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中国护照出行指南 | Digital Nomad CN</title>
  <meta name="description" content="中国护照免签、落地签、电子签国家完整列表，2026年最新数据">
  <link rel="stylesheet" href="../styles.css">
  <style>
    .passport-hero { background: linear-gradient(135deg, #dc2626 0%, #b91c1c 50%, #991b1b 100%); color: #fff; padding: 4rem 1.5rem; text-align: center; }
    .passport-hero h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .passport-hero p { opacity: 0.9; font-size: 1.1rem; max-width: 600px; margin: 0 auto; }
    .stats-bar { display: flex; justify-content: center; gap: 2rem; padding: 1.5rem; background: #fef2f2; flex-wrap: wrap; }
    .stat-item { text-align: center; }
    .stat-item .number { font-size: 2rem; font-weight: 700; color: #dc2626; }
    .stat-item .label { font-size: 0.85rem; color: #666; }
    .filter-tabs { display: flex; justify-content: center; gap: 0.5rem; padding: 1.5rem; flex-wrap: wrap; }
    .filter-btn { padding: 0.5rem 1.2rem; border: 1px solid #e5e7eb; background: #fff; border-radius: 999px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
    .filter-btn.active { background: #dc2626; color: #fff; border-color: #dc2626; }
    .filter-btn:hover:not(.active) { background: #f9fafb; }
    .country-table { width: 100%; max-width: 900px; margin: 0 auto 3rem; border-collapse: collapse; font-size: 0.95rem; }
    .country-table th { background: #f9fafb; padding: 0.75rem 1rem; text-align: left; font-weight: 600; color: #374151; border-bottom: 2px solid #e5e7eb; position: sticky; top: 0; }
    .country-table td { padding: 0.75rem 1rem; border-bottom: 1px solid #f3f4f6; }
    .country-table tr:hover { background: #f9fafb; }
    .visa-badge { display: inline-block; padding: 0.25rem 0.6rem; border-radius: 999px; font-size: 0.8rem; font-weight: 500; }
    .visa-badge.免签 { background: #dcfce7; color: #166534; }
    .visa-badge.落地签 { background: #fef3c7; color: #92400e; }
    .visa-badge.电子签 { background: #dbeafe; color: #1e40af; }
    .visa-badge.条件免签 { background: #f3e8ff; color: #6b21a8; }
    .visa-badge.落地签-电子签 { background: #fef3c7; color: #92400e; }
    .visa-badge.电子签-落地签 { background: #dbeafe; color: #1e40af; }
    .visa-badge.落地签-旅游卡 { background: #fef3c7; color: #92400e; }
    .notes { font-size: 0.85rem; color: #6b7280; }
    .official-link { color: #dc2626; text-decoration: none; font-size: 0.85rem; }
    .official-link:hover { text-decoration: underline; }
    .container { max-width: 1000px; margin: 0 auto; padding: 0 1rem; }
    .disclaimer { background: #fffbeb; border-left: 4px solid #f59e0b; padding: 1rem 1.5rem; margin: 2rem auto; max-width: 900px; font-size: 0.9rem; color: #92400e; }
    .last-updated { text-align: center; color: #9ca3af; font-size: 0.85rem; margin-bottom: 2rem; }
    @media (max-width: 640px) {
      .country-table { font-size: 0.85rem; }
      .country-table th, .country-table td { padding: 0.5rem 0.6rem; }
      .passport-hero h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a href="../" class="logo">Digital Nomad CN</a>

  <div class="stats-bar">
    <div class="stat-item"><div class="number" id="stat-visa-free">-</div><div class="label">免签</div></div>
    <div class="stat-item"><div class="number" id="stat-landing">-</div><div class="label">落地签</div></div>
    <div class="stat-item"><div class="number" id="stat-evisa">-</div><div class="label">电子签</div></div>
    <div class="stat-item"><div class="number" id="stat-total">-</div><div class="label">总计</div></div>
  </div>

  <div class="container">
    <div class="filter-tabs">
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="免签">免签</button>
      <button class="filter-btn" data-filter="落地签">落地签</button>
      <button class="filter-btn" data-filter="电子签">电子签</button>
      <button class="filter-btn" data-filter="条件免签">条件免签</button>
    </div>

    <div class="last-updated">数据更新时间：2026-07-08 | 来源：中国领事服务网</div>

    <table class="country-table" id="passport-table">
      <thead>
        <tr>
          <th>国家/地区</th>
          <th>签证类型</th>
          <th>停留天数</th>
          <th>备注</th>
          <th>官方链接</th>

      </thead>
      <tbody id="table-body"></tbody>
    </table>

    <div class="disclaimer">
      <strong>⚠️ 免责声明</strong><br>
      签证政策随时可能变化，出行前请务必通过中国领事服务网或目的国驻华使馆确认最新政策。本页面数据仅供参考，不构成法律建议。
    </div>
  </div>

  <footer class="site-footer" style="text-align:center;padding:2rem;color:#9ca3af;font-size:0.85rem;">

    <p>数据来源于 <a href="https://cs.mfa.gov.cn">中国领事服务网</a>，遵循 CC BY-SA 4.0 协议</p>
  </footer>

    function renderTable(filter) {
      const tbody = document.getElementById('table-body');
      const filtered = filter === 'all' ? visaData : visaData.filter(d => d.type.includes(filter));
      tbody.innerHTML = filtered.map(d => `
        <tr>
          <td><strong>${d.name}</strong></td>
          <td><span class="visa-badge ${d.type.split('/')[0]}">${d.type}</span></td>
          <td>${d.days} 天</td>
          <td class="notes">${d.notes}</td>
          <td><a href="${d.url}" target="_blank" class="official-link">领事服务网 →</a></td>
        </tr>
      `).join('');
    }

    function updateStats() {
      document.getElementById('stat-total').textContent = visaData.length;
      document.getElementById('stat-visa-free').textContent = visaData.filter(d => d.type.includes('免签') && !d.type.includes('条件')).length;
      document.getElementById('stat-landing').textContent = visaData.filter(d => d.type.includes('落地签')).length;
      document.getElementById('stat-evisa').textContent = visaData.filter(d => d.type.includes('电子签')).length;
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderTable(btn.dataset.filter);
      });
    });

    renderTable('all');
    updateStats();
  </script>
</body>
</html>
