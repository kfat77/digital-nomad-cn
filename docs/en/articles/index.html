<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Articles — Digital Nomad Guide</title>
    <meta name="description" content="Data-driven in-depth articles from the Digital Nomad Guide: visa guides, country rankings, cost analysis, and more.">
    <meta property="og:title" content="Articles — Digital Nomad Guide">
    <meta property="og:description" content="Data-driven in-depth articles: visa guides, country rankings, cost analysis">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kfat77.github.io/digital-nomad-cn/en/articles/">
    <link rel="canonical" href="https://kfat77.github.io/digital-nomad-cn/en/articles/">
    <link rel="alternate" hreflang="zh-CN" href="https://kfat77.github.io/digital-nomad-cn/articles/">
    <link rel="alternate" hreflang="en" href="https://kfat77.github.io/digital-nomad-cn/en/articles/">
    <link rel="stylesheet" href="../../style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="../../" class="logo">
                <span class="logo-icon">◈</span>
                <span>Digital Nomad Guide</span>
            </a>
            <nav class="main-nav">
                <a href="../../countries/">Countries</a>
                <a href="../../visas/">Visas</a>
                <a href="../../cities/">Cities</a>
                <a href="../../articles/">Articles</a>
                <a href="../../compare/">Compare</a>
                <a href="../../routes/">Routes</a>
                <a href="../../search/">Search</a>
                <a href="../../assistant/">Assistant</a>
                <a href="../../recommend/">Recommend</a>
            </nav>
            <a href="https://github.com/kfat77/digital-nomad-cn" class="github-btn" target="_blank">GitHub</a>
        </div>
    </header>

    <main class="articles-list-page">
        <div class="articles-list-header">
            <h1>Articles</h1>
            <p>Data-driven in-depth articles powered by our open database</p>
            <p style="margin-top:8px;font-size:0.9rem;"><a href="../rss.xml" style="color:#3b82f6;text-decoration:none;">📡 RSS Feed</a></p>
        </div>
        <div class="articles-grid" id="articles-grid"></div>
    </main>

    <footer class="footer" style="margin-top: 60px;">
        <div class="footer-inner">
            <p> Digital Nomad Guide · Open Global Mobility Data Platform</p>
            <p><a href="https://github.com/kfat77/digital-nomad-cn">GitHub</a> · <a href="../../">Home</a></p>
        </div>
    </footer>

    <script>
        fetch('articles.json')
            .then(r => r.json())
            .then(articles => {
                const grid = document.getElementById('articles-grid');
                grid.innerHTML = articles.map(a => {
                    const tags = a.tags.map(t => `<span class="article-tag">${t}</span>`).join('');
                    return `
                        <a href="${a.slug}/" class="article-card">
                            <div class="article-card-tags">${tags}</div>
                            <h2>${a.title}</h2>
                            <p>${a.description}</p>
                            <div class="article-card-meta">${a.date}</div>
                        </a>
                    `;
                }).join('');
            })
            .catch(e => {
                document.getElementById('articles-grid').innerHTML = '<p style="text-align:center;color:#94a3b8">Failed to load articles. Please refresh.</p>';
            });
    </script>
</body>
</html>
